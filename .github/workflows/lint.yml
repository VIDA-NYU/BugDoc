name: Lint & Code Quality

on:
  push:
    branches: [ master, main, develop ]
  pull_request:
    branches: [ master, main, develop ]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"
        cache: 'pip'

    - name: Upgrade pip
      run: |
        python -m pip install --upgrade pip setuptools

    - name: Install linting tools
      run: |
        pip install black flake8 ruff isort mypy bandit[toml] pylint

    - name: Check code formatting with black
      run: |
        black --check bugdoc_api/bugdoc bugdoc_cli test examples --diff
      continue-on-error: true

    - name: Check import sorting with isort
      run: |
        isort --check-only bugdoc_api/bugdoc bugdoc_cli test --profile black --diff
      continue-on-error: true


    - name: Lint with ruff
      run: |
        ruff check bugdoc_api/bugdoc bugdoc_cli test
      continue-on-error: true

    - name: Type checking with mypy
      run: |
        mypy bugdoc_api/bugdoc --ignore-missing-imports
      continue-on-error: true

    - name: Security scanning with bandit
      run: |
        bandit -r bugdoc_api/bugdoc bugdoc_cli -ll -f json -o bandit-report.json || true
      continue-on-error: true

    - name: Upload bandit report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: bandit-report
        path: bandit-report.json
