# .readthedocs.yml
# Read the Docs configuration file
# See https://docs.readthedocs.com/platform/stable/config-file/v2.html for details

# Required
version: 2

# Build environment: ensure RTD uses a modern Ubuntu and Python toolset
build:
  os: ubuntu-24.04
  tools:
    python: "3.10"

# Build documentation in the docs/ directory with Sphinx
sphinx:
  configuration: docs/conf.py

# Python installation steps for Read the Docs. Use explicit pip install method
# to reproduce the same environment as CI.
python:
  install:
    - method: pip
      path: .
      extra_requirements:
        - docs
    - requirements: docs/requirements_docs.txt
